<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Box</title>

  <!-- Google Fonts Pixelify Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">

  <style>
    body, input, button, a, h2, #result {
      font-family: 'Pixelify Sans', sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url("background.png") no-repeat center/cover; /* שנה לכתובת התמונה שלך */
    }

    .box {
      background: url('background.png') no-repeat center/cover; /* שנה לכתובת התמונה שלך */
      padding: 50px;
      border-radius: 20px;
      width: 520px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
    }

    h2 {
      color: white;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      border: none;
      font-size: 32px;
    }

    button, a {
      display: block;
      width: 100%;
      padding: 20px;
      border-radius: 10px;
      text-decoration: none;
      text-align: center;
      font-size: 32px;
      margin-top: 10px;
    }

    button {
      background: #00aaff;
      color: white;
      border: none;
      cursor: pointer;
    }

    a {
      background: lime;
      color: black;
      display: none;
    }

    #result {
      margin-top: 16px;
      font-size: 28px;
      color: white;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>Enter Password</h2>
    <input type="password" id="password" placeholder="Password">

    <button id="checkBtn" onclick="checkPassword()">Submit</button>
    <a id="linkBtn" href="https://example.com">Continue</a>

    <div id="result"></div>
  </div>

  <script>
    function checkPassword() {
      const input = document.getElementById("password").value;
      const result = document.getElementById("result");
      const button = document.getElementById("checkBtn");
      const link = document.getElementById("linkBtn");

      const correctPassword = "worms"; // שנה כאן את הסיסמה שלך

      if (input === correctPassword) {
        result.textContent = "Correct Password";
        result.style.color = "lime";

        button.style.display = "none";
        link.style.display = "block";
      } else {
        result.textContent = "!Wrong Password";
        result.style.color = "red";
      }
    }
  </script>

</body>
</html>
